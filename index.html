<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SALTE Endpoint Installer</title>

    <script
        type="module"
        src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module">
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 48px auto;
            padding: 0 24px;
            line-height: 1.5;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 24px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Instalador SALTE Endpoint</h1>

        <p>
            Conecte o ESP32-S3 no USB, use Chrome ou Edge no computador
            e clique em instalar.
        </p>

        <esp-web-install-button manifest="manifest.json">
            <button slot="activate">Instalar firmware</button>

            <span slot="unsupported">
                Navegador não suportado. Use Chrome ou Edge no computador.
            </span>

            <span slot="not-allowed">
                Esta página precisa estar em HTTPS.
            </span>
        </esp-web-install-button>
    </main>
</body>
</html>
