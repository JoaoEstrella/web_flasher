<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SALTE ESP32-S3 Flasher</title>

    <style>
        :root {
            font-family: Arial, sans-serif;
            color: #111827;
            background: #f9fafb;
        }

        body {
            margin: 0;
            padding: 32px;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 24px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        .warning {
            border-left: 4px solid #b45309;
            background: #fffbeb;
            padding: 12px 16px;
            margin: 16px 0;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        button,
        input[type="file"]::file-selector-button {
            border: 0;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        button {
            color: white;
            background: #111827;
        }

        button:disabled {
            cursor: not-allowed;
            background: #9ca3af;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px dashed #9ca3af;
            border-radius: 10px;
            background: #f9fafb;
        }

        progress {
            width: 100%;
            height: 18px;
        }

        pre {
            height: 260px;
            overflow: auto;
            padding: 12px;
            border-radius: 10px;
            background: #111827;
            color: #e5e7eb;
            font-size: 13px;
            white-space: pre-wrap;
        }

        .muted {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>

<body>
<main>
    <h1>SALTE ESP32-S3 Flasher</h1>

    <p>
        Selecione um firmware local e grave no ESP32-S3 via USB.
    </p>

    <div class="warning">
        Use somente o arquivo <strong>salte-endpoint-merged.bin</strong>.
        Este instalador grava em <strong>0x0</strong>.
        Não use <strong>firmware.bin</strong> isolado.
    </div>

    <input
        id="firmwareFile"
        type="file"
        accept=".bin,application/octet-stream"
    >

    <label>
        <input id="eraseFlash" type="checkbox" checked>
        Apagar flash antes de gravar
    </label>

    <div class="row">
        <button id="connectButton">Conectar ESP32-S3</button>
        <button id="flashButton" disabled>Gravar firmware</button>
        <button id="disconnectButton" disabled>Desconectar</button>
        <button id="clearLogButton">Limpar log</button>
    </div>

    <progress id="progressBar" value="0" max="100"></progress>
    <p id="status" class="muted">Aguardando conexão.</p>

    <pre id="log"></pre>
</main>

<script type="module">
    import {
        ESPLoader,
        Transport
    } from "https://unpkg.com/esptool-js/lib/index.js";

    const CHIP_FAMILY = "esp32s3";
    const BAUD_RATE = 460800;

    const FLASH_ADDRESS = 0x0;
    const FLASH_MODE = "dio";
    const FLASH_FREQ = "80m";
    const FLASH_SIZE = "8MB";

    const firmwareInput = document.getElementById("firmwareFile");
    const eraseFlashInput = document.getElementById("eraseFlash");

    const connectButton = document.getElementById("connectButton");
    const flashButton = document.getElementById("flashButton");
    const disconnectButton = document.getElementById("disconnectButton");
    const clearLogButton = document.getElementById("clearLogButton");

    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("status");
    const logOutput = document.getElementById("log");

    let port = null;
    let transport = null;
    let esploader = null;
    let connected = false;

    const terminal = {
        clean() {
            logOutput.textContent = "";
        },

        writeLine(data) {
            appendLog(data);
        },

        write(data) {
            appendLog(data);
        }
    };

    function appendLog(message) {
        const text = String(message ?? "");
        logOutput.textContent += `${text}\n`;
        logOutput.scrollTop = logOutput.scrollHeight;
    }

    function setStatus(message) {
        statusText.textContent = message;
        appendLog(`[status] ${message}`);
    }

    function setBusy(isBusy) {
        connectButton.disabled = isBusy || connected;
        flashButton.disabled = isBusy || !connected;
        disconnectButton.disabled = isBusy || !connected;
        firmwareInput.disabled = isBusy;
        eraseFlashInput.disabled = isBusy;
    }

    function validateBrowser() {
        if (!("serial" in navigator)) {
            throw new Error(
                "Web Serial não disponível. Use Chrome ou Edge em HTTPS."
            );
        }
    }

    function getSelectedFile() {
        const file = firmwareInput.files?.[0];

        if (!file) {
            throw new Error("Selecione o arquivo .bin primeiro.");
        }

        if (!file.name.toLowerCase().endsWith(".bin")) {
            throw new Error("Arquivo inválido. Selecione um .bin.");
        }

        if (!file.name.toLowerCase().includes("merged")) {
            throw new Error(
                "Use o merged bin. Exemplo: salte-endpoint-merged.bin"
            );
        }

        return file;
    }

    async function connectDevice() {
        validateBrowser();

        setBusy(true);
        setStatus("Selecionando porta serial...");

        try {
            port = await navigator.serial.requestPort();
            transport = new Transport(port, true);

            esploader = new ESPLoader({
                transport,
                baudrate: BAUD_RATE,
                terminal,
                debugLogging: false
            });

            setStatus("Conectando ao ESP32-S3...");
            const chipName = await esploader.main();

            connected = true;
            setStatus(`Conectado: ${chipName}`);

            connectButton.disabled = true;
            flashButton.disabled = false;
            disconnectButton.disabled = false;
        } catch (error) {
            connected = false;
            appendLog(error?.stack ?? error);
            setStatus("Falha ao conectar.");

            if (transport) {
                await safeDisconnect();
            }
        } finally {
            setBusy(false);
            connectButton.disabled = connected;
            flashButton.disabled = !connected;
            disconnectButton.disabled = !connected;
        }
    }

    async function flashFirmware() {
        const file = getSelectedFile();

        if (!esploader || !transport || !connected) {
            throw new Error("ESP32-S3 não conectado.");
        }

        setBusy(true);
        progressBar.value = 0;

        try {
            setStatus(`Lendo arquivo local: ${file.name}`);
            const firmwareData = new Uint8Array(await file.arrayBuffer());

            setStatus(`Gravando ${firmwareData.length} bytes em 0x0...`);

            await esploader.writeFlash({
                fileArray: [
                    {
                        data: firmwareData,
                        address: FLASH_ADDRESS
                    }
                ],
                flashMode: FLASH_MODE,
                flashFreq: FLASH_FREQ,
                flashSize: FLASH_SIZE,
                eraseAll: eraseFlashInput.checked,
                compress: true,
                reportProgress: (_fileIndex, written, total) => {
                    const percent = total > 0
                        ? Math.round((written / total) * 100)
                        : 0;

                    progressBar.value = percent;
                    statusText.textContent = `Gravando... ${percent}%`;
                }
            });

            setStatus("Firmware gravado. Resetando...");
            await esploader.after("hard_reset");

            setStatus("Concluído.");
        } catch (error) {
            appendLog(error?.stack ?? error);
            setStatus("Falha na gravação.");
        } finally {
            setBusy(false);
            connectButton.disabled = connected;
            flashButton.disabled = !connected;
            disconnectButton.disabled = !connected;
        }
    }

    async function safeDisconnect() {
        try {
            if (transport) {
                await transport.disconnect();
            }
        } catch (error) {
            appendLog(error?.stack ?? error);
        } finally {
            port = null;
            transport = null;
            esploader = null;
            connected = false;
        }
    }

    async function disconnectDevice() {
        setBusy(true);
        setStatus("Desconectando...");

        await safeDisconnect();

        progressBar.value = 0;
        setStatus("Desconectado.");

        connectButton.disabled = false;
        flashButton.disabled = true;
        disconnectButton.disabled = true;
        firmwareInput.disabled = false;
        eraseFlashInput.disabled = false;
    }

    connectButton.addEventListener("click", connectDevice);

    flashButton.addEventListener("click", async () => {
        try {
            await flashFirmware();
        } catch (error) {
            appendLog(error?.stack ?? error);
            setStatus("Erro.");
        }
    });

    disconnectButton.addEventListener("click", disconnectDevice);

    clearLogButton.addEventListener("click", () => {
        logOutput.textContent = "";
    });
</script>
</body>
</html>
